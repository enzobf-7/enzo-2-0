async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+"/rest/v1/"+path,{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation",...opts.headers},
    ...opts
  });
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}

// ── STATE ──────────────────────────────────────────────────────────────────
// status: 0=none, 1=en cours, 2=terminé
let objStatus={};      // {id: 0|1|2}
let customText={};     // {id: "custom text"}
let customIdeas={};    // {id: [...ideas]}
let expanded=new Set();
let editingIdeas=null;
let editingObj=null;
let activeFilter="all";
let searchQ="";
let objLoaded=false;
let currentPage=1;
const PAGE_SIZE=30;

let bookStatus={};     // {id: 0|1}
let libFilter="all";
let libLoaded=false;

let activeTab="objectives";

// ── PERSISTENCE ────────────────────────────────────────────────────────────
function saveLocal(){
  localStorage.setItem("e20_status",JSON.stringify(objStatus));
  localStorage.setItem("e20_ideas",JSON.stringify(customIdeas));
  localStorage.setItem("e20_text",JSON.stringify(customText));
  localStorage.setItem("e20_books",JSON.stringify(bookStatus));
}

function loadLocal(){
  try{
    const s=localStorage.getItem("e20_status");if(s)objStatus=JSON.parse(s);
    const i=localStorage.getItem("e20_ideas");if(i)customIdeas=JSON.parse(i);
    const t=localStorage.getItem("e20_text");if(t)customText=JSON.parse(t);
    const b=localStorage.getItem("e20_books");if(b)bookStatus=JSON.parse(b);
  }catch(e){}
}

async function loadFromDB(){
  loadLocal();
  try{
    const rows=await sbFetch("objectives?select=obj_id,status,custom_ideas,custom_text");
    rows.forEach(r=>{
      if(r.status)objStatus[r.obj_id]=r.status;
      if(r.custom_ideas)customIdeas[r.obj_id]=r.custom_ideas;
      if(r.custom_text)customText[r.obj_id]=r.custom_text;
    });
  }catch(e){console.warn("Objectives offline",e);}
  objLoaded=true;
  renderFilters();renderGrid();

  try{
    const rows=await sbFetch("books?select=book_id,status");
    rows.forEach(r=>{if(r.status)bookStatus[r.book_id]=r.status;});
  }catch(e){console.warn("Books offline",e);}
  libLoaded=true;
  renderLibFilters();renderLib();
}

async function upsertObj(id,fields){
  saveLocal();
  try{
    await sbFetch("objectives",{method:"POST",
      headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({obj_id:id,...fields})});
  }catch(e){console.warn("Sync err",e);}
}

async function upsertBook(id,fields){
  saveLocal();
  try{
    await sbFetch("books",{method:"POST",
      headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({book_id:id,...fields})});
  }catch(e){console.warn("Book sync err",e);}
}

// ── TAB SWITCH ──────────────────────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  document.getElementById("section-objectives").style.display=tab==="objectives"?"block":"none";
  document.getElementById("section-library").style.display=tab==="library"?"block":"none";
  document.getElementById("nav-obj").className="nav-btn"+(tab==="objectives"?" active":"");
  document.getElementById("nav-lib").className="nav-btn"+(tab==="library"?" active":"");
  window.scrollTo({top:0});
}

// ── OBJECTIVES ──────────────────────────────────────────────────────────────
function getStatus(id){return objStatus[id]||0;}
function getText(o){return customText[o.id]||o.text;}
function getIdeas(o){return customIdeas[o.id]||o.ideas;}

function filtered(){
  return OBJ.filter(o=>{
    const matchCat=activeFilter==="all"||o.cat===activeFilter;
    const matchQ=!searchQ||getText(o).toLowerCase().includes(searchQ.toLowerCase());
    return matchCat&&matchQ;
  });
}

function renderFilters(){
  const f=document.getElementById("filters");
  const cc={};OBJ.forEach(o=>{cc[o.cat]=(cc[o.cat]||0)+1;});
  const pills=[{id:"all",label:"Tout ("+OBJ.length+")"},
    ...Object.entries(CATS).map(([id,c])=>({id,label:c.label+" ("+(cc[id]||0)+")"}))];
  f.innerHTML=pills.map(p=>{
    const active=p.id===activeFilter?" active":"";
    const style=p.id!=="all"&&active?` style="background:${CATS[p.id].color};border-color:${CATS[p.id].color};color:#15100C"`:"";
    return `<div class="pill${active}"${style} onclick="setFilter('${p.id}')">${p.label}</div>`;
  }).join("");
}

function renderGrid(){
  const grid=document.getElementById("grid");
  if(!objLoaded){grid.innerHTML='<div class="loading">Chargement...</div>';return;}
  const all=filtered();
  if(!all.length){grid.innerHTML='<div class="empty">Aucun objectif trouvé</div>';document.getElementById("pagination").innerHTML="";return;}
  const totalPages=Math.ceil(all.length/PAGE_SIZE);
  if(currentPage>totalPages)currentPage=1;
  const start=(currentPage-1)*PAGE_SIZE;
  const items=all.slice(start,start+PAGE_SIZE);
  grid.innerHTML=items.map(o=>{
    const c=CATS[o.cat];
    const st=getStatus(o.id);
    const isExp=expanded.has(o.id);
    const isEditIdeas=editingIdeas===o.id;
    const isEditObj=editingObj===o.id;
    const statusClass=st===1?" en-cours":st===2?" termine":"";
    const cbContent=st===1?"→":st===2?`<svg width="11" height="11" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`:"";
    const ideas=getIdeas(o);
    const text=getText(o);

    let ideasPanel="";
    if(isExp){
      if(isEditIdeas){
        ideasPanel=`<div class="edit-panel">
          <div class="edit-label">Modifier les idées (1 par ligne)</div>
          <textarea class="edit-textarea" id="ei-${o.id}" style="min-height:120px">${ideas.join("\n")}</textarea>
          <div class="edit-actions">
            <button class="btn-save" onclick="saveIdeas(${o.id})">Sauvegarder</button>
            <button class="btn-cancel" onclick="cancelEdit()">Annuler</button>
            <button class="btn-reset" onclick="resetIdeas(${o.id})">Réinitialiser</button>
          </div>
        </div>`;
      } else {
        ideasPanel=`<div class="ideas-panel">
          <div class="ideas-title-row">
            <div class="ideas-title">— Idées & pistes</div>
            <button class="edit-ideas-btn" onclick="startEditIdeas(${o.id})">Modifier</button>
          </div>
          <ul class="ideas-list">${ideas.map(i=>`<li class="idea-item"><span class="idea-arrow">→</span><span class="idea-text">${i}</span></li>`).join("")}</ul>
        </div>`;
      }
    }

    let objEditPanel="";
    if(isEditObj){
      objEditPanel=`<div class="edit-panel">
        <div class="edit-label">Modifier l'objectif</div>
        <textarea class="edit-textarea" id="eo-${o.id}">${text}</textarea>
        <div class="edit-actions">
          <button class="btn-save" onclick="saveObjText(${o.id})">Sauvegarder</button>
          <button class="btn-cancel" onclick="cancelEdit()">Annuler</button>
          <button class="btn-reset" onclick="resetObjText(${o.id})">Réinitialiser</button>
        </div>
      </div>`;
    }

    return `<div class="card${statusClass}" id="card-${o.id}">
      <div class="card-top">
        <div class="cat-stripe" style="background:${c.color}"></div>
        <div class="card-inner" onclick="cycleStatus(${o.id})">
          <div class="card-num">N°${String(o.id).padStart(3,"0")}</div>
          <div class="card-text">${text}</div>
          <div class="card-meta">
            <span class="cat-tag" style="background:${c.bg};color:${c.tc}">${c.label}</span>
            <div class="card-actions">
              <button class="edit-obj-btn" onclick="event.stopPropagation();startEditObj(${o.id})">✎</button>
              <button class="expand-btn" onclick="event.stopPropagation();toggleExpand(${o.id})">${isExp?"Masquer":"Idées +"}</button>
            </div>
          </div>
        </div>
        <div class="cb-wrap" onclick="cycleStatus(${o.id})">
          <div class="cb">${cbContent}</div>
        </div>
      </div>
      ${objEditPanel}
      ${ideasPanel}
    </div>`;
  }).join("");
  updateProgress();
  renderPagination(all.length);
}

function renderPagination(total){
  const pg=document.getElementById("pagination");
  const totalPages=Math.ceil(total/PAGE_SIZE);
  if(totalPages<=1){pg.innerHTML="";return;}
  let html=`<button class="page-btn arrow" onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>← Préc.</button>`;
  for(let i=1;i<=totalPages;i++){
    html+=`<button class="page-btn${i===currentPage?" active":""}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn arrow" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?"disabled":""}>Suiv. →</button>`;
  pg.innerHTML=html;
}

function goPage(p){
  currentPage=p;
  renderGrid();
  window.scrollTo({top:0,behavior:"smooth"});
}

async function cycleStatus(id){
  const cur=getStatus(id);
  const next=(cur+1)%3;
  objStatus[id]=next;
  renderGrid();
  await upsertObj(id,{status:next});
}

function toggleExpand(id){
  if(expanded.has(id)){expanded.delete(id);editingIdeas=null;}
  else{expanded.add(id);}
  renderGrid();
}

function startEditIdeas(id){
  editingIdeas=id;editingObj=null;
  expanded.add(id);
  renderGrid();
  setTimeout(()=>{const ta=document.getElementById("ei-"+id);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);
}

function startEditObj(id){
  editingObj=id;editingIdeas=null;
  renderGrid();
  setTimeout(()=>{const ta=document.getElementById("eo-"+id);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);
}

function cancelEdit(){editingIdeas=null;editingObj=null;renderGrid();}

async function saveIdeas(id){
  const ta=document.getElementById("ei-"+id);if(!ta)return;
  const lines=ta.value.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
  customIdeas[id]=lines;editingIdeas=null;
  renderGrid();
  await upsertObj(id,{custom_ideas:JSON.stringify(lines)});
}

async function resetIdeas(id){
  delete customIdeas[id];editingIdeas=null;
  renderGrid();
  await upsertObj(id,{custom_ideas:null});
}

async function saveObjText(id){
  const ta=document.getElementById("eo-"+id);if(!ta)return;
  const val=ta.value.trim();
  if(val)customText[id]=val;
  editingObj=null;
  renderGrid();
  await upsertObj(id,{custom_text:val||null});
}

async function resetObjText(id){
  delete customText[id];editingObj=null;
  renderGrid();
  await upsertObj(id,{custom_text:null});
}

function setFilter(id){activeFilter=id;currentPage=1;renderFilters();renderGrid();}

function updateProgress(){
  const total=OBJ.length;
  const cours=Object.values(objStatus).filter(s=>s===1).length;
  const done=Object.values(objStatus).filter(s=>s===2).length;
  const pct=Math.round(done/total*100);
  document.getElementById("p-done").textContent=done;
  document.getElementById("p-pct").textContent=pct+"%";
  document.getElementById("bar-cours").style.width=Math.round(cours/total*100)+"%";
  document.getElementById("bar-done").style.width=pct+"%";
  document.getElementById("count-cours").textContent=cours;
  document.getElementById("count-done").textContent=done;
}

document.getElementById("search").addEventListener("input",e=>{searchQ=e.target.value;currentPage=1;renderGrid();});

// ── LIBRARY ──────────────────────────────────────────────────────────────────
function renderLibFilters(){
  const f=document.getElementById("lib-filters");
  const cc={};BOOKS.forEach(b=>{cc[b.cat]=(cc[b.cat]||0)+1;});
  const pills=[{id:"all",label:"Tout ("+BOOKS.length+")"},
    ...Object.entries(LIB_CATS).map(([id,c])=>({id,label:c.label+" ("+(cc[id]||0)+")"}))];
  f.innerHTML=pills.map(p=>{
    const active=p.id===libFilter?" active":"";
    const style=p.id!=="all"&&active?` style="background:${LIB_CATS[p.id].color};border-color:${LIB_CATS[p.id].color};color:#15100C"`:"";
    return `<div class="pill${active}"${style} onclick="setLibFilter('${p.id}')">${p.label}</div>`;
  }).join("");
}

function setLibFilter(id){libFilter=id;renderLibFilters();renderLib();}

function renderLib(){
  const grid=document.getElementById("lib-grid");
  const items=libFilter==="all"?BOOKS:BOOKS.filter(b=>b.cat===libFilter);
  const sorted=[...items].sort((a,b)=>a.order-b.order);
  let html="";
  if(libFilter==="all"){
    html+=`<div class="cat-header-lib"><div class="cat-title-lib">Ordre de lecture conseillé</div><div class="cat-line-lib"></div></div>`;
  } else {
    const c=LIB_CATS[libFilter];
    html+=`<div class="cat-header-lib"><div class="cat-title-lib">${c.label}</div><div class="cat-line-lib"></div></div>`;
  }
  sorted.forEach(b=>{
    const c=LIB_CATS[b.cat];
    const isRead=(bookStatus[b.id]||0)===1;
    html+=`<div class="book-card${isRead?" read":""}" id="book-${b.id}">
      <div class="book-inner">
        <div class="book-stripe" style="background:${c.color}"></div>
        <div class="book-content">
          <div class="book-num">Lecture N°${String(b.order).padStart(2,"0")} · ${c.label}</div>
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
          <div class="book-desc">${b.desc}</div>
          <div class="book-footer">
            <span class="cat-tag" style="background:${c.bg};color:${c.tc}">${c.label}</span>
            <a class="buy-btn" href="${b.url}" target="_blank">Commander →</a>
          </div>
        </div>
        <div class="book-cb-wrap" onclick="toggleBook(${b.id})">
          <div class="book-cb"><svg width="11" height="11" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
      </div>
    </div>`;
  });
  grid.innerHTML=html;
  updateLibProgress();
}

async function toggleBook(id){
  const cur=bookStatus[id]||0;
  const next=cur===1?0:1;
  bookStatus[id]=next;
  renderLib();
  await upsertBook(id,{status:next});
}

function updateLibProgress(){
  const total=BOOKS.length;
  const done=Object.values(bookStatus).filter(s=>s===1).length;
  const pct=Math.round(done/total*100);
  document.getElementById("lib-done").textContent=done;
  document.getElementById("lib-bar").style.width=pct+"%";
  document.getElementById("lib-bar-count").textContent=done;
  document.getElementById("lib-pct").textContent=pct+"%";
  let label="commence par L'obstacle est le chemin";
  if(done===1)label="premier livre lu";
  else if(done>=2&&done<6)label="en route";
  else if(done>=6&&done<10)label="la base se construit";
  else if(done>=10&&done<12)label="presque là";
  else if(done===12)label="bibliothèque complète ✦";
  document.getElementById("lib-label").textContent=label;
}

// ── INIT ──────────────────────────────────────────────────────────────────
switchTab("objectives");
loadFromDB();
</script>
