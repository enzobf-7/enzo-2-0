<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Enzo 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#15100C;--bg-grid:#1F1710;--surface:#1E1710;--surface-2:#241C14;--surface-hover:#2A2018;
  --ink:#EDE4D3;--ink-soft:#C9BDA8;--ink-muted:#8F8477;--ink-faint:#5F564A;
  --border:#332820;--border-soft:#281F17;
  --accent:#D04A3C;--accent-bright:#E35A4D;--accent-soft:#3A1E1A;
  --progress:#E0A840;--success:#8FB87C;
}
html,body{background:var(--bg);min-height:100%}
html{background-image:linear-gradient(var(--border-soft) 1px,transparent 1px),linear-gradient(90deg,var(--border-soft) 1px,transparent 1px);background-size:48px 48px;background-position:-1px -1px;background-attachment:fixed}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:20px}

/* ── HEADER ── */
.header{background:rgba(21,16,12,0.94);border-bottom:1px solid var(--border);padding:20px 20px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.title-block{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.title-main{font-family:'Instrument Serif',Georgia,serif;font-size:30px;line-height:1;color:var(--ink);font-weight:400;font-style:italic}
.title-main em{color:var(--accent)}
.title-sub{font-family:'Instrument Serif',Georgia,serif;font-size:18px;color:var(--ink-muted);font-weight:400;font-style:italic}

/* ── PROGRESS HERO ── */
.progress-hero{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative}
.progress-big{font-family:'Instrument Serif',Georgia,serif;font-size:38px;line-height:1;font-weight:400;display:flex;align-items:baseline;gap:0}
.p-done{color:var(--accent);font-style:italic}
.p-sep{color:var(--ink-faint);margin:0 5px;font-style:italic}
.p-total{color:var(--ink-muted)}
.p-pct{position:absolute;top:16px;right:18px;font-family:'Instrument Serif',Georgia,serif;font-size:18px;font-style:italic;color:var(--accent)}
.p-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin:6px 0 12px}
.bars-row{display:flex;flex-direction:column;gap:6px}
.bar-item{display:flex;align-items:center;gap:8px}
.bar-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;min-width:72px}
.bar-label.en-cours{color:var(--progress)}
.bar-label.termines{color:var(--success)}
.bar-bg{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill-cours{height:100%;background:var(--progress);border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(224,168,64,0.4)}
.bar-fill-done{height:100%;background:var(--success);border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(143,184,124,0.4)}
.bar-count{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;min-width:24px;text-align:right}
.bar-count.en-cours{color:var(--progress)}
.bar-count.termines{color:var(--success)}

/* ── CONTROLS & FILTERS ── */
.controls{padding:14px 20px 0}
.search{width:100%;padding:11px 16px;border:1px solid var(--border);border-radius:100px;font-size:14px;background:var(--surface);outline:none;color:var(--ink);font-family:inherit;-webkit-appearance:none}
.search::placeholder{color:var(--ink-faint);font-style:italic}
.search:focus{border-color:var(--accent)}
.filters{display:flex;gap:6px;overflow-x:auto;padding:12px 20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 14px;border-radius:100px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;cursor:pointer;white-space:nowrap;color:var(--ink-soft);font-family:inherit;letter-spacing:0.04em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;transition:all .15s}
.pill:hover{border-color:var(--ink-muted);color:var(--ink)}
.pill.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}

/* ── GRID ── */
.grid{padding:6px 20px 20px;display:flex;flex-direction:column;gap:8px;max-width:780px;margin:0 auto}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;overflow:hidden;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.card:hover{border-color:var(--border)}
.card.en-cours{border-color:rgba(224,168,64,0.4);background:rgba(224,168,64,0.04)}
.card.termine{border-color:rgba(143,184,124,0.25);background:rgba(143,184,124,0.04);opacity:.6}
.card.termine .card-text{color:var(--ink-muted)}
.card-top{display:flex;align-items:stretch;cursor:pointer}
.cat-stripe{width:3px;flex-shrink:0;margin:14px 0;border-radius:2px}
.card-inner{flex:1;padding:14px 8px 12px 14px;min-width:0}
.card-num{font-family:'Instrument Serif',Georgia,serif;font-size:13px;color:var(--accent);margin-bottom:5px;font-style:italic;opacity:0.8}
.card-text{font-size:15px;line-height:1.45;color:var(--ink);font-weight:400;letter-spacing:-0.005em}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px;flex-wrap:wrap}
.cat-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:100px;letter-spacing:0.04em;text-transform:uppercase}
.card-actions{display:flex;align-items:center;gap:6px}
.expand-btn{font-size:10px;color:var(--ink-muted);padding:4px 10px;cursor:pointer;border:1px solid var(--border);border-radius:100px;background:transparent;font-family:inherit;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:all .15s;-webkit-tap-highlight-color:transparent}
.expand-btn:hover{border-color:var(--accent);color:var(--accent)}
.edit-obj-btn{font-size:10px;color:var(--ink-faint);padding:4px 9px;cursor:pointer;border:1px solid var(--border-soft);border-radius:100px;background:transparent;font-family:inherit;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:all .15s;-webkit-tap-highlight-color:transparent}
.edit-obj-btn:hover{border-color:var(--ink-muted);color:var(--ink-muted)}

/* ── STATUS BUTTON ── */
.cb-wrap{padding:12px 14px 12px 6px;cursor:pointer;flex-shrink:0;display:flex;align-items:flex-start;-webkit-tap-highlight-color:transparent}
.cb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;font-size:11px;font-weight:600}
.card.en-cours .cb{border-color:var(--progress);background:rgba(224,168,64,0.15);color:var(--progress)}
.card.termine .cb{background:var(--success);border-color:var(--success);color:#fff}

/* ── IDEAS ── */
.ideas-panel{border-top:1px solid var(--border-soft);background:var(--bg-grid)}
.ideas-title-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px}
.ideas-title{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:14px;color:var(--accent)}
.edit-ideas-btn{font-size:10px;color:var(--ink-muted);padding:3px 9px;cursor:pointer;border:1px solid var(--border);border-radius:100px;background:transparent;font-family:inherit;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:all .15s}
.edit-ideas-btn:hover{border-color:var(--accent);color:var(--accent)}
.ideas-list{padding:0 18px 14px}
.idea-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.idea-item:last-child{border-bottom:none}
.idea-arrow{color:var(--accent);font-size:11px;flex-shrink:0;margin-top:4px}
.idea-text{font-size:13px;line-height:1.6;color:var(--ink-soft)}

/* ── EDIT PANELS ── */
.edit-panel{border-top:1px solid var(--border-soft);background:var(--bg-grid);padding:14px 18px}
.edit-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:8px}
.edit-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--ink);font-family:inherit;font-size:14px;line-height:1.6;padding:10px 12px;resize:vertical;outline:none;-webkit-appearance:none;min-height:80px}
.edit-textarea:focus{border-color:var(--accent)}
.edit-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-save{padding:7px 16px;background:var(--accent);color:white;border:none;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-save:hover{background:var(--accent-bright)}
.btn-cancel{padding:7px 16px;background:transparent;color:var(--ink-muted);border:1px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-cancel:hover{border-color:var(--ink-muted);color:var(--ink)}
.btn-reset{padding:7px 14px;background:transparent;color:var(--ink-faint);border:1px solid var(--border-soft);border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;margin-left:auto}

/* ── EMPTY ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--ink-muted);font-size:18px;font-style:italic;font-family:'Instrument Serif',Georgia,serif}
.loading{text-align:center;padding:3rem;color:var(--ink-faint);font-size:14px}

/* ── BOTTOM NAV ── */
.bottom-nav{background:rgba(21,16,12,0.96);border-bottom:1px solid var(--border);display:flex;z-index:200;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-btn{flex:1;display:flex;flex-direction:row;align-items:center;justify-content:center;padding:12px 0;cursor:pointer;border:none;background:transparent;color:var(--ink-muted);font-family:inherit;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:color .15s;gap:6px;-webkit-tap-highlight-color:transparent;border-bottom:2px solid transparent}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-icon{font-size:14px;line-height:1}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;background:var(--accent);color:white;border:none;border-radius:50%;width:44px;height:44px;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(208,74,60,0.4);z-index:150;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:hover{transform:translateY(-2px)}

/* ── LIBRARY ── */
#section-library{display:none}
.book-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;overflow:hidden;transition:all .2s}
.book-card:hover{border-color:var(--border)}
.book-card.read{opacity:.55}
.book-inner{display:flex;align-items:stretch}
.book-stripe{width:3px;flex-shrink:0;margin:14px 0;border-radius:2px}
.book-content{flex:1;padding:14px 12px 12px 14px;min-width:0}
.book-num{font-family:'Instrument Serif',Georgia,serif;font-size:13px;color:var(--accent);margin-bottom:3px;font-style:italic;opacity:0.8}
.book-title{font-size:15px;line-height:1.35;color:var(--ink);font-weight:500;letter-spacing:-0.01em;margin-bottom:2px}
.book-author{font-size:12px;color:var(--ink-muted);font-style:italic;margin-bottom:8px}
.book-desc{font-size:13px;line-height:1.6;color:var(--ink-soft);margin-bottom:12px}
.book-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.buy-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:transparent;border:1px solid var(--border);border-radius:100px;color:var(--ink-muted);font-family:inherit;font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;text-decoration:none;transition:all .2s}
.buy-btn:hover{border-color:var(--accent);color:var(--accent-bright)}
.book-cb-wrap{padding:12px 14px;cursor:pointer;flex-shrink:0;display:flex;align-items:flex-start}
.book-cb{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent;margin-top:2px}
.book-card.read .book-cb{background:var(--success);border-color:var(--success)}
.book-cb svg{display:none}
.book-card.read .book-cb svg{display:block}
.cat-header-lib{margin:12px 0 6px;display:flex;align-items:center;gap:10px}
.cat-title-lib{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:17px;color:var(--ink-muted);font-weight:400}
.cat-line-lib{flex:1;height:1px;background:var(--border-soft)}

ul{list-style:none}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 20px 8px;flex-wrap:wrap}
.page-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--ink-muted);font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.page-btn:hover{border-color:var(--ink-muted);color:var(--ink)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.page-btn.arrow{width:auto;padding:0 12px;border-radius:100px;font-size:12px;letter-spacing:0.04em}
.page-btn.arrow:disabled{opacity:.3;cursor:default}
.page-info{font-size:11px;color:var(--ink-faint);letter-spacing:0.06em;text-transform:uppercase;padding:0 4px}
</style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-obj" onclick="switchTab('objectives')">
    <span class="nav-icon">◎</span>Objectifs
  </button>
  <button class="nav-btn" id="nav-lib" onclick="switchTab('library')">
    <span class="nav-icon">⊟</span>Bibliothèque
  </button>
</nav>

<!-- ── OBJECTIVES SECTION ── -->
<div id="section-objectives">
<div class="header">
  <div class="title-block">
    <div class="title-main">Enzo <em>2.0</em></div>
    <div class="title-sub">les 300 objectifs</div>
  </div>
  <div class="progress-hero">
    <div class="progress-big">
      <span class="p-done" id="p-done">0</span>
      <span class="p-sep">/</span>
      <span class="p-total">300</span>
    </div>
    <div class="p-pct" id="p-pct">0%</div>
    <div class="bars-row">
      <div class="bar-item">
        <span class="bar-label en-cours">En cours</span>
        <div class="bar-bg"><div class="bar-fill-cours" id="bar-cours" style="width:0%"></div></div>
        <span class="bar-count en-cours" id="count-cours">0</span>
      </div>
      <div class="bar-item">
        <span class="bar-label termines">Terminés</span>
        <div class="bar-bg"><div class="bar-fill-done" id="bar-done" style="width:0%"></div></div>
        <span class="bar-count termines" id="count-done">0</span>
      </div>
    </div>
  </div>
</div>
<div class="controls">
  <input class="search" type="search" placeholder="Rechercher un objectif..." id="search" autocomplete="off"/>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"><div class="loading">Chargement...</div></div>
<div class="pagination" id="pagination"></div>
</div>

<!-- ── LIBRARY SECTION ── -->
<div id="section-library">
<div class="header">
  <div class="title-block">
    <div class="title-main">Enzo <em>2.0</em></div>
    <div class="title-sub">la bibliothèque</div>
  </div>
  <div class="progress-hero">
    <div class="progress-big">
      <span class="p-done" id="lib-done">0</span>
      <span class="p-sep">/</span>
      <span class="p-total" id="lib-total">13</span>
    </div>
    <div class="p-pct" id="lib-pct">0%</div>
    <div class="p-label" id="lib-label">commence par L'obstacle est le chemin</div>
    <div class="bars-row">
      <div class="bar-item">
        <span class="bar-label termines">Lus</span>
        <div class="bar-bg"><div class="bar-fill-done" id="lib-bar" style="width:0%"></div></div>
        <span class="bar-count termines" id="lib-bar-count">0</span>
      </div>
    </div>
  </div>
</div>
<div class="filters" id="lib-filters"></div>
<div class="grid" id="lib-grid"><div class="loading">Chargement...</div></div>
</div>

<button class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ── CATS & DATA ──────────────────────────────────────────────────────────
const CATS={
  mental:{label:"Mental & Mindset",color:"#B4A9F0",bg:"#2A2240",tc:"#CFC4F7"},
  business:{label:"Contenu & Revenus",color:"#8FD0B3",bg:"#1C3429",tc:"#B8E4CB"},
  corps:{label:"Corps & Santé",color:"#E38B6A",bg:"#3A201A",tc:"#F0B59A"},
  famille:{label:"Famille & Héritage",color:"#E39AB0",bg:"#38212B",tc:"#F0BED0"},
  social:{label:"Cercle Social",color:"#7DAFE0",bg:"#1C2D40",tc:"#A8CAE8"},
  env:{label:"Environnement",color:"#B8B0A0",bg:"#2A2520",tc:"#D4CCBA"},
  magnetisme:{label:"Magnétisme",color:"#E0B470",bg:"#3A2C18",tc:"#F0CC96"},
  apprentissage:{label:"Apprentissage",color:"#A8C97B",bg:"#25311A",tc:"#C9E0A4"}
};

const LIB_CATS={
  neuro:{label:"Neurosciences",color:"#7B9EE0",bg:"rgba(123,158,224,0.12)",tc:"#9AB5E8"},
  epi:{label:"Épigénétique",color:"#8FB87C",bg:"rgba(143,184,124,0.12)",tc:"#A5C893"},
  psycho:{label:"Psychologie",color:"#D4A96A",bg:"rgba(212,169,106,0.12)",tc:"#DDB97A"},
  philo:{label:"Philosophie",color:"#B07CC6",bg:"rgba(176,124,198,0.12)",tc:"#C090D6"},
  coaching:{label:"Coaching",color:"#D04A3C",bg:"rgba(208,74,60,0.12)",tc:"#E35A4D"},
};

const BOOKS=[
  {id:0,cat:"psycho",order:1,title:"Ne cède jamais",author:"David Goggins",desc:"Ta lecture actuelle. L'histoire brute d'un homme qui s'est reconstruit par la discipline pure. Le livre qui précède et légitime tout le reste de cette bibliothèque.",url:"https://www.amazon.fr/s?k=Ne+c%C3%A8de+jamais+Goggins"},
  {id:1,cat:"philo",order:2,title:"L'obstacle est le chemin",author:"Ryan Holiday",desc:"Transformer chaque difficulté en levier. Même énergie que Goggins, angle philosophique. Court et percutant.",url:"https://www.amazon.fr/s?k=L%27obstacle+est+le+chemin+Ryan+Holiday"},
  {id:2,cat:"psycho",order:3,title:"L'homme à la recherche du sens",author:"Viktor Frankl",desc:"Pourquoi on se bat. Le sens avant les outils. Fondamental pour ta mission et pour comprendre ce qui motive vraiment les hommes.",url:"https://www.amazon.fr/s?k=L%27homme+%C3%A0+la+recherche+du+sens+Frankl"},
  {id:3,cat:"philo",order:4,title:"Ego is the Enemy",author:"Ryan Holiday",desc:"Après Frankl, tu comprends le sens. Ryan Holiday t'apprend à ne pas te saboter. Très utile pour le pattern perfectionnisme.",url:"https://www.amazon.fr/s?k=Ego+is+the+Enemy+Ryan+Holiday+fran%C3%A7ais"},
  {id:4,cat:"psycho",order:5,title:"Les quatre accords toltèques",author:"Don Miguel Ruiz",desc:"Identité et croyances limitantes. Simple mais profond. Prépare le terrain pour Dispenza. À relire régulièrement.",url:"https://www.amazon.fr/s?k=Les+quatre+accords+tolt%C3%A8ques+Don+Miguel+Ruiz"},
  {id:5,cat:"neuro",order:6,title:"Rompre avec soi-même",author:"Joe Dispenza",desc:"Comment reprogrammer son cerveau pour créer une nouvelle réalité. La référence neurosciences appliquées.",url:"https://www.amazon.fr/Rompre-avec-soi-m%C3%AAme-Joe-Dispenza/dp/2813222607"},
  {id:6,cat:"epi",order:7,title:"La biologie des croyances",author:"Bruce Lipton",desc:"Comment nos pensées influencent nos cellules au niveau biologique. Complète Dispenza sur l'aspect épigénétique.",url:"https://www.amazon.fr/s?k=La+biologie+des+croyances+Bruce+Lipton"},
  {id:7,cat:"neuro",order:8,title:"Le cerveau du bonheur",author:"Rick Hanson",desc:"Comment installer concrètement les nouveaux circuits cérébraux. Pratique, ancré dans la science, accessible.",url:"https://www.amazon.fr/s?k=Le+cerveau+du+bonheur+Rick+Hanson"},
  {id:8,cat:"neuro",order:9,title:"Becoming Supernatural",author:"Joe Dispenza",desc:"La suite logique. Physique quantique et pratique avancée. Pour aller plus loin dans la reprogrammation.",url:"https://www.amazon.fr/s?k=Becoming+Supernatural+Dispenza+fran%C3%A7ais"},
  {id:9,cat:"philo",order:10,title:"Méditations",author:"Marc Aurèle",desc:"Le stoïcisme pur après avoir tout compris sur le cerveau et l'identité. Court, dense, intemporel.",url:"https://www.amazon.fr/s?k=M%C3%A9ditations+Marc+Aur%C3%A8le"},
  {id:10,cat:"psycho",order:11,title:"Awaken the Giant Within",author:"Tony Robbins",desc:"Les six besoins humains fondamentaux. Comprendre ce qui motive vraiment les autres. Essentiel pour ta mission de coach.",url:"https://www.amazon.fr/s?k=Awaken+the+Giant+Within+Tony+Robbins+fran%C3%A7ais"},
  {id:11,cat:"coaching",order:12,title:"The Coaching Habit",author:"Michael Bungay Stanier",desc:"Les bases du coaching bien fait. Sept questions puissantes pour accompagner vraiment. Simple, efficace, concret.",url:"https://www.amazon.fr/s?k=The+Coaching+Habit+Stanier"},
  {id:12,cat:"coaching",order:13,title:"Co-Active Coaching",author:"Kimsey-House et al.",desc:"La référence mondiale du coaching professionnel. Tu l'ouvres quand tu es prêt à coacher vraiment.",url:"https://www.amazon.fr/s?k=Co-Active+Coaching+Kimsey-House"},

const OBJ=[
// ── MENTAL & MINDSET ──────────────────────────────────────────────────────
{id:1,cat:"mental",text:"Me lever sans snooze pendant 7 jours d'affilée",ideas:["Pose ton réveil à l'autre bout de la chambre — physiquement se lever brise l'inertie.","Couche-toi avant 23h la veille. Le réveil facile se gagne la nuit.","Pose ta première action de la journée à côté du réveil (carnet, verre d'eau). Une ancre visuelle démarre l'élan.","App Alarmy : elle exige de résoudre un puzzle pour s'éteindre. Difficile à ignorer."]},
{id:2,cat:"mental",text:"Tenir un journal de bord chaque matin pendant 30 jours",ideas:["Morning pages (Julia Cameron) : 3 pages à la main en flux de conscience, sans filtre, sans relecture.","Format structuré en 5 min : 1 gratitude + 1 intention du jour + 1 peur que je vais affronter.","Carnet physique > app. L'écriture à la main active des zones du cerveau différentes. Moleskine ou Leuchtturm."]},
{id:3,cat:"mental",text:"Identifier mes 3 pensées auto-saboteuses les plus fréquentes",ideas:["Tiens un 'log mental' 1 semaine : chaque fois qu'une pensée négative surgit, note-la sur ton téléphone.","Les 3 qui reviennent le plus souvent sont tes patterns. Donne-leur un nom pour les désarmer (ex: 'voix du saboteur').","Méthode Byron Katie : questionne chaque pensée — Est-ce vrai ? Qu'est-ce qui se passerait sans elle ?"]},
{id:4,cat:"mental",text:"Écrire une réfutation écrite pour chacune de ces pensées",ideas:["Format CBT : Pensée → Émotion → Preuve POUR → Preuve CONTRE → Pensée alternative plus juste.","Sois précis et factuel dans les preuves contre. Pas de pensée positive vide — des faits concrets.","Relis ces réfutations dès que la pensée réapparaît. La répétition reprogramme."]},
{id:5,cat:"mental",text:"Méditer 10 minutes par jour pendant 21 jours",ideas:["App Waking Up (Sam Harris) : la meilleure approche intellectuelle et non-religieuse. 10 min guidées au réveil.","Même heure chaque jour = ancrage. Après le café, avant le téléphone. La régularité compte plus que la durée.","Quand les pensées arrivent, note-les mentalement comme 'pensée' et reviens à la respiration. Sans jugement."]},
{id:6,cat:"mental",text:"Lire un livre sur la psychologie du succès",ideas:["'Mindset' de Carol Dweck — la différence entre état d'esprit fixe et de croissance. Fondamental.","'Can't Hurt Me' de David Goggins — brut, difficile, transformateur. Pour les moments où tu veux abandonner.","'The Psychology of Self-Esteem' de Nathaniel Branden — ancre l'estime sur des bases réelles, pas sur les résultats."]},
{id:7,cat:"mental",text:"Lire un livre sur la discipline et l'identité",ideas:["'Atomic Habits' de James Clear — les systèmes battent les objectifs. Lis les chapitres sur l'identité d'abord.","'The War of Art' de Pressfield — 100 pages, 2h de lecture, la meilleure analyse de la résistance intérieure.","'Discipline is Destiny' de Ryan Holiday — la maîtrise de soi comme fondation de tout le reste."]},
{id:8,cat:"mental",text:"Écrire ma définition personnelle du succès",ideas:["Réponds à 3 questions : À quoi ressemble ma vie dans 5 ans (lieu, routine, revenus, relations) ? Comment je me sens ? Ce que je ne fais plus ?","Inclus ce que le succès N'EST PAS pour toi. Ça délimite autant que ce qu'il est.","Relis ta définition chaque mois. Elle évoluera. C'est normal et sain."]},
{id:9,cat:"mental",text:"Créer une routine matinale de moins de 30 minutes et la tenir 14 jours",ideas:["Exemple compact : Réveil (5 min) → eau + lumière naturelle (5 min) → mouvement léger (10 min) → relecture manifeste + intention (5 min) → tâche 1 sans téléphone (5 min).","Pas de téléphone dans la routine. Zéro. Le cerveau matinal est ton ressource la plus précieuse.","Teste la routine 3 jours avant de la modifier. Ne la change pas au nom du perfectionnisme."]},
{id:10,cat:"mental",text:"Passer une journée entière sans réseaux sociaux",ideas:["Désactive les apps la veille ou utilise Screen Time sur iPhone pour les bloquer de 8h à 22h.","Note toutes les fois où tu as voulu ouvrir une app — c'est révélateur du niveau de dépendance.","Remplace chaque impulsion réseau par 5 grandes respirations puis une action concrète."]},
{id:11,cat:"mental",text:"Faire un bilan écrit de ma semaine chaque dimanche",ideas:["Format en 4 questions (15 min max) : Qu'est-ce que j'ai accompli ? Qu'est-ce que j'ai évité et pourquoi ? Quel est l'insight de la semaine ? Quelle est mon intention principale la semaine prochaine ?","Fais-le toujours au même endroit et au même moment. Un rituel ancré est un rituel tenu."]},
{id:12,cat:"mental",text:"Identifier un pattern de procrastination récurrent et le nommer",ideas:["Tiens un 'procrastination log' 1 semaine : quand ça arrive, sur quoi, ce que tu fais à la place, ce que tu ressentais juste avant.","Les patterns communs : perfectionisme (attendre d'être prêt), peur de l'échec (ne pas commencer = ne pas échouer), overwhelm (tâche trop grande sans découpage).","Donne un nom à ton pattern. 'Mon perfectionnisme-saboteur'. Le nommer, c'est déjà lui enlever de la puissance."]},
{id:13,cat:"mental",text:"Écrire une lettre à mon moi dans 5 ans",ideas:["Écris en détail : où tu es, ce que tu fais, comment tu vis, avec qui. Sois précis. L'imprécision réduit la puissance.","Inclus : ce que tu veux qu'il soit fier d'avoir accompli, ce que tu lui demandes pardon de faire encore aujourd'hui.","Stocke-la dans Notion ou un email programmé (FutureMe.org). Ouvre-la dans 5 ans exactement."]},
{id:14,cat:"mental",text:"Établir une liste de mes peurs les plus limitantes",ideas:["Format : Peur → D'où vient-elle (origine) → Est-elle réelle ou imaginaire → Pire scénario réaliste → Et si ça arrivait, qu'est-ce que je ferais ?","La peur de l'opinion des autres (FOPO) est souvent la mère de toutes les autres. Cherche si c'est le cas pour toi.","Les peurs qu'on nomme perdent la moitié de leur pouvoir. Ne les fuis pas — inventorie-les."]},
{id:15,cat:"mental",text:"Confronter une peur mineure par semaine pendant 4 semaines",ideas:["Semaine 1 : parler à un inconnu dans un café. Semaine 2 : poster quelque chose de vulnérable en ligne. Semaine 3 : faire une demande à quelqu'un en s'attendant à un refus. Semaine 4 : prendre la parole dans un groupe.","Note comment tu te sens APRÈS. La peur avant l'action est toujours plus grande que la réalité de l'action."]},
{id:16,cat:"mental",text:"Supprimer une application chronophage de mon téléphone",ideas:["Vérifie d'abord avec Screen Time quelle app tu utilises le plus et lequel te laisse le plus vide. Supprime celle-là.","Remplace par un déclencheur positif : livre physique sur la table de nuit, app de méditation à la place.","Si tu ne peux pas supprimer (réseau pro), déplace l'app dans un dossier enfoui et désactive toutes les notifications."]},
{id:17,cat:"mental",text:"Mettre mon téléphone en mode avion de 22h à 7h pendant 2 semaines",ideas:["Charge le dans une autre pièce — cuisine ou salon. Pas dans la chambre.","Achète un réveil classique si tu l'utilises comme alarme. 10€ chez Ikea. Ça change la vie.","Préviens 1-2 personnes proches que tu es injoignable après 22h. Ça libère la culpabilité."]},
{id:18,cat:"mental",text:"Créer un environnement de travail sans distraction",ideas:["Téléphone dans une autre pièce pendant les blocs de travail profond. Pas en silencieux — ailleurs physiquement.","Extensions Chrome : Freedom ou Cold Turkey pour bloquer sites distrayants pendant des plages définies.","Même espace de travail = même signal au cerveau. Le cerveau apprend que cet endroit = concentration."]},
{id:19,cat:"mental",text:"Finir une tâche difficile avant de toucher mon téléphone le matin",ideas:["Identifie la veille ta MIT (Most Important Task) — la tâche qui, si elle est faite, rend la journée réussie.","90 minutes de travail profond avant le téléphone = plus de valeur produite que 4h de travail fragmenté.","Pas d'exception. Même 20 minutes si c'est tout ce que tu as. L'habitude prime sur la durée."]},
{id:20,cat:"mental",text:"Lire 20 pages par jour pendant 30 jours",ideas:["20 pages/jour = environ 1 livre toutes les 2-3 semaines. En 1 an : 15-20 livres. C'est transformateur.","Lis dans les transports, avant de dormir, pendant les repas seul. Remplace les scroll par les pages.","Un livre physique sur la table de nuit > une app. L'objet crée le signal."]},
{id:21,cat:"mental",text:"Faire une liste de mes victoires passées (min. 20)",ideas:["Inclus les petites : avoir tenu 30 jours quelque chose, avoir refusé quelque chose de confortable, avoir aidé quelqu'un.","Cette liste est un antidote direct au syndrome de l'imposteur. Relis-la quand tu doutes.","Ajoute une victoire à la liste chaque semaine. Elle grandit avec toi."]},
{id:22,cat:"mental",text:"Définir mes valeurs fondamentales en 5 mots max",ideas:["Cherche tes valeurs dans tes colères : ce qui te met hors de toi = ce qui compte vraiment pour toi.","Exercice : imagine que tu es sur ton lit de mort. Tu veux avoir vécu comment ? Quels mots te viennent ?","Exemples possibles : liberté, intégrité, dépassement, sens, impact, famille, authenticité, excellence."]},
{id:23,cat:"mental",text:"Relire mon manifeste chaque matin pendant 30 jours",ideas:["Imprime-le et pose-le sur ton bureau. Ou en photo sur ton téléphone comme fond d'écran de verrouillage.","Lis-le à voix haute si possible — l'audition renforce l'ancrage neurologique.","Note chaque matin 1 phrase qui résonne particulièrement ce jour-là. Ça crée un dialogue vivant avec le texte."]},
{id:24,cat:"mental",text:"Écrire l'histoire du avant/après Enzo 2.0",ideas:["Structure narrative : qui j'étais honnêtement (sans édulcorer) → le moment de bascule → qui je deviens.","Cette histoire est aussi la base de ton contenu. Partager sa transformation authentique est le contenu le plus puissant.","Sois précis sur le 'avant'. La vulnérabilité précise est magnétique. Les généralités ne le sont pas."]},
{id:25,cat:"mental",text:"Tenir un journal de gratitude 3x/semaine pendant 1 mois",ideas:["3 éléments spécifiques (pas 'ma santé' mais 'j'ai pu courir 5km ce matin malgré la fatigue').","Le soir avant de dormir — ça reprogramme le cerveau à chercher le positif en fin de journée et améliore le sommeil.","La gratitude n'est pas de la pensée positive naïve — c'est entraîner l'attention vers ce qui fonctionne."]},
{id:26,cat:"mental",text:"Passer une journée complète à exécuter sans planifier",ideas:["La veille : note tes 3 tâches du lendemain. Le jour J : exécute, ne révise pas le plan.","Antidote au perfectionnisme planificateur — on ne peut pas tout anticiper. L'exécution révèle ce que le planning ne voit pas.","Autorise-toi à faire des choses imparfaites ce jour-là. Vitesse d'exécution > perfection."]},
{id:27,cat:"mental",text:"Écouter un podcast de développement personnel par semaine",ideas:["Huberman Lab (science du comportement et de la performance), The Diary of a CEO (Steven Bartlett), Lex Fridman.","Écoute pendant les marches, le sport, la cuisine. Transforme le temps 'perdu' en apprentissage.","Prends une note après chaque épisode : 1 insight que j'applique cette semaine. Sinon le contenu reste passif."]},
{id:28,cat:"mental",text:"Identifier mes 3 sources de stress principales",ideas:["Écris tout ce qui te stresse en vrac (15 min). Regroupe par thème. Cherche les 2-3 causes racines.","Souvent c'est : l'incertitude financière, la peur du jugement, et une relation ou situation non résolue.","Sépare : ce que je contrôle vs ce que je ne contrôle pas. Stoïcisme de base mais puissant."]},
{id:29,cat:"mental",text:"Créer un plan d'action pour chaque source de stress",ideas:["Pour chaque stress : 1 action concrète que tu peux faire cette semaine pour le réduire. Même micro.","Le stress non actionné devient anxiété. Le stress avec un plan d'action devient challenge.","Revois ce plan chaque dimanche dans ton bilan hebdomadaire."]},
{id:30,cat:"mental",text:"Pratiquer la visualisation de mon futur idéal chaque soir pendant 2 semaines",ideas:["5 minutes, yeux fermés. Tu vis ta vie dans 3 ans : où tu es, ce que tu fais, comment tu te sens, avec qui.","Sois sensoriel : que vois-tu, qu'entends-tu, que ressens-tu physiquement ? Plus c'est précis, plus c'est puissant.","La visualisation prépare le cerveau à reconnaître les opportunités en lien avec l'objectif visualisé."]},
{id:31,cat:"mental",text:"Apprendre une technique de gestion de l'anxiété",ideas:["Cohérence cardiaque : 6 respirations par minute (inspire 5s, expire 5s), 3 fois par jour, 5 minutes. Effets cliniquement prouvés.","Respiration physiologique (Andrew Huberman) : double inspiration par le nez (sniff-sniff) puis longue expiration par la bouche. Active le parasympathique en 1-2 cycles.","Ancrage sensoriel 5-4-3-2-1 : 5 choses que tu vois, 4 que tu touches, 3 que tu entends, 2 que tu sens, 1 que tu goûtes."]},
{id:32,cat:"mental",text:"Créer une liste de déclencheurs négatifs et les documenter",ideas:["Tiens un log 2 semaines : situation → émotion → intensité /10. Les patterns apparaissent vite.","Les déclencheurs communs : fatigue, faim, réseau sociaux, certaines personnes, certains environnements.","Pour chaque déclencheur identifié, crée un protocole de réponse : si X alors je fais Y (respiration, marche, appel)."]},
{id:33,cat:"mental",text:"Finir 3 tâches que je repousse depuis longtemps",ideas:["Liste-les toutes. Classe-les par pénibilité. Commence par la plus lourde — l'effet Zeigarnik (tâches non finies pèsent cognitivement) va se dissoudre.","Méthode deadline imposée : dis à quelqu'un que tu auras fini avant demain. L'engagement social crée l'urgence.","Après chaque tâche terminée : note comment tu te sens. Pas de procrastination sans comparaison avec la légèreté de l'accomplissement."]},
{id:34,cat:"mental",text:"Dire non à une demande qui ne m'apporte rien cette semaine",ideas:["Formule simple : 'Je ne peux pas me permettre de m'engager là-dessus en ce moment.' Pas d'explication excessive.","Teste la règle 'si ce n'est pas un oui enthousiaste, c'est un non.' Simple, radicale, efficace.","Le non à l'extérieur est un oui à toi-même. Chaque non prononcé renforce la capacité à en dire d'autres."]},
{id:35,cat:"mental",text:"Évaluer mon niveau d'énergie sur 10 chaque soir pendant 30 jours",ideas:["Note dans un carnet ou une note téléphone : date, énergie /10, 1 facteur principal (sport, alimentation, sommeil, stress).","Après 2 semaines les patterns d'énergie haute et basse émergent. Les semaines suivantes tu peux anticiper et protéger les jours creux.","Corrèle avec tes habitudes : les jours à 8-9 ont quoi en commun ? Les jours à 3-4 ?"]},
{id:36,cat:"mental",text:"Identifier l'heure de la journée où je suis le plus productif",ideas:["Teste 3 plages horaires sur 3 jours chacun : 6-9h, 10-13h, 15-18h. Note ta concentration /10 et la qualité du travail produit.","La majorité des gens sont au pic cognitif dans les 2-4 premières heures après le réveil. Pas de généralisation — teste.","Une fois identifié, protège cette plage comme si c'était une réunion avec le CEO de ta vie."]},
{id:37,cat:"mental",text:"Bloquer cette plage horaire pour mon travail profond",ideas:["Dans ton calendrier, nomme le bloc avec la tâche précise : pas 'deep work' mais 'écrire 3 posts pour la semaine'.","Téléphone ailleurs, notifications off, porte fermée. Minimum 90 minutes de bloc (durée d'un cycle de concentration complète).","Si quelqu'un prend ce créneau, reporte à un autre moment de la journée. La règle est : le bloc de travail profond ne disparaît pas."]},
{id:38,cat:"mental",text:"Réduire le temps de décision sur les petites choses (règle des 2 minutes)",ideas:["Si ça prend moins de 2 min à faire, fais-le maintenant. Zéro liste, zéro report, exécution immédiate.","Pour les décisions mineures : donne-toi 30 secondes max. La plupart des micro-décisions n'ont pas de mauvaise réponse — elles ont juste besoin d'une réponse.","La fatigue décisionnelle est réelle. En prenant moins de petites décisions, tu préserves l'énergie pour les grandes."]},
{id:39,cat:"mental",text:"Créer un rituel de fin de journée pour couper mentalement",ideas:["Exemple (10 min) : note 3 accomplissements du jour → liste les 3 tâches de demain → ferme tous les onglets → dis 'c'est fini pour aujourd'hui'.","Ce rituel signale au cerveau que le mode travail est terminé. Sans ça, le cerveau reste en état de veille active le soir.","Ajoute un acte physique de transition : changement de vêtements, courte marche, douche. Le corps ancre le signal."]},
{id:40,cat:"mental",text:"Écrire ce que signifie tuer mes excuses dans ma situation concrète",ideas:["Liste tes 5 excuses les plus utilisées (argent, temps, situation, logement, attente du bon moment).","Pour chacune : écris la vérité cachée derrière. L'excuse est toujours un masque sur quelque chose de plus profond.","Puis écris ce que tu ferais AUJOURD'HUI si cette excuse n'existait pas. C'est ton plan d'action réel."]},

// ── CONTENU & REVENUS ─────────────────────────────────────────────────────
{id:41,cat:"business",text:"Définir mon positionnement en 1 phrase (à qui je parle, sur quoi, pourquoi moi)",ideas:["Formule : 'J'aide [hommes en reconstruction] à [retrouver leur direction et leur puissance] grâce à [la psychologie, la philosophie et le travail sur l'identité].'","Teste cette phrase sur 3 personnes : la répètent-ils spontanément ? Si non, simplifie encore.","Le positionnement n'est pas un slogan — c'est une boussole interne qui guide chaque décision de contenu."]},
{id:42,cat:"business",text:"Choisir 3 thèmes piliers autour desquels tout mon contenu gravitera",ideas:["Exemple de 3 piliers cohérents : 1/ Identité & transformation masculine — 2/ Psychologie du dépassement — 3/ Philosophie appliquée au quotidien.","Tout post doit appartenir à l'un de ces 3 piliers. Si tu ne sais pas où le classer, ne le publie pas.","Les piliers créent la cohérence — les gens s'abonnent à une promesse claire, pas à un flux de pensées aléatoires."]},
{id:43,cat:"business",text:"Publier mon premier post Instagram sur le mindset",ideas:["Commence par ton histoire ou une vérité inconfortable que peu de gens osent dire. L'authenticité bat la perfection.","Format carrousel : 5-7 slides, titre fort en slide 1, 1 idée par slide, CTA en dernière slide.","Publie avant d'être prêt. Le premier post sera toujours imparfait. C'est attendu et accepté."]},
{id:44,cat:"business",text:"Publier mon premier post LinkedIn sur la psychologie / philosophie",ideas:["LinkedIn préfère les formats narratifs. Commence par une vraie expérience personnelle, pas une citation.","Hook : 1 phrase courte et forte qui crée de la curiosité ou nomme une douleur réelle.","Le contenu mindset est sous-représenté sur LinkedIn. C'est une opportunité réelle, pas un risque."]},
{id:45,cat:"business",text:"Publier 3x/semaine sur Instagram pendant 1 mois sans exception",ideas:["Prépare les 12 posts du mois en une seule session de batch (dimanche ou lundi). Planifie avec Later ou Buffer.","Rythme suggéré : mardi = identité, jeudi = psychologie, samedi = philosophie ou histoire personnelle.","La consistance sur 1 mois construit l'habitude créatrice. Le mois suivant sera plus facile."]},
{id:46,cat:"business",text:"Publier 2x/semaine sur LinkedIn pendant 1 mois sans exception",ideas:["Batch le dimanche soir : 2 posts rédigés, programmés, terminés. Aucune décision en semaine.","Structure LinkedIn : Hook fort (1 ligne) → Développement en 3-4 paragraphes courts → CTA clair (question ou lien).","LinkedIn favorise les posts qui génèrent des commentaires. Termine par une question ouverte."]},
{id:47,cat:"business",text:"Écrire 30 idées de posts en une seule session",ideas:["Méthode : prends chacun de tes 3 thèmes piliers, liste 10 angles différents par thème = 30 idées en 45 minutes.","Format brain dump : pas de filtre, pas de jugement. Toutes les idées méritent d'être notées. Le tri vient après.","Utilise tes propres expériences comme source primaire. Tes histoires sont ce que personne d'autre ne peut copier."]},
{id:48,cat:"business",text:"Créer un système de planification de contenu (batch hebdo)",ideas:["Un tableau Notion ou Google Sheet : colonnes = Idée / Thème pilier / Format / Plateforme / Statut / Date de publication.","Réserve 2h le dimanche pour écrire et programmer la semaine suivante. Pas d'improvisation en semaine.","Le système brise le cycle 'je ne sais pas quoi poster aujourd'hui' — la question est déjà répondue à l'avance."]},
{id:49,cat:"business",text:"Filmer ma première vidéo face caméra et la publier",ideas:["Sujet : quelque chose que tu maîtrises et sur lequel tu as une opinion ferme. Pas d'introduction — commence directement par le cœur du sujet.","60 secondes max pour commencer. Une idée, une caméra, une prise (ou deux). Publie avant de re-regarder 10 fois.","Lumière naturelle de face, téléphone posé à hauteur des yeux. Qualité suffisante pour commencer."]},
{id:50,cat:"business",text:"Lancer un compte dédié (nom, bio, photo pro alignés avec ma vision)",ideas:["Nom : @prenom.angle ou @prenom_mindset (clair, simple, mémorable). Évite les underscores multiples.","Bio Instagram en 3 lignes : qui tu es → ce que tu offres → pour qui → lien (Linktree ou newsletter).","Photo de profil : lumière naturelle, regard direct, fond simple. Professionnelle mais humaine. Pas de filtre excessif."]},
{id:51,cat:"business",text:"Atteindre 100 abonnés sur mon compte principal",ideas:["Interagis chaque jour avec 10-15 comptes dans ta niche : commentaires substantiels (pas 'super post !'), vraies réactions.","Partage ton compte dans ta liste de contacts proches. Les 100 premiers viennent souvent du réseau existant.","Concentre-toi sur la valeur réelle par post, pas sur les chiffres. 100 abonnés engagés > 1000 fantômes."]},
{id:52,cat:"business",text:"Atteindre 500 abonnés",ideas:["Analyse tes 5 meilleurs posts (engagement/vues). Comprends pourquoi ils ont performé et duplique la formule.","Un reel ou carrousel qui tourne bien peut multiplier la croissance par 5. Cherche ton premier 'hit'.","Collabore avec 1 ou 2 créateurs similaires (même taille) pour des expositions croisées."]},
{id:53,cat:"business",text:"Atteindre 1000 abonnés",ideas:["Le premier palier psychologique. À ce stade tu as prouvé que le contenu a de la valeur pour des inconnus.","Poste un reel ou thread sur ta transformation personnelle — les histoires authentiques dépassent souvent les 10k vues.","Contacte 3 podcasts de ta niche pour proposer une interview. La visibilité croisée accélère la croissance."]},
{id:54,cat:"business",text:"Identifier les 10 créateurs qui font ce que je veux faire et les analyser",ideas:["Tableau d'analyse : fréquence / format dominant / ton / taux d'engagement / ce qui les différencie / leurs meilleurs posts.","Inspire-toi de la structure, jamais du fond. Ton vécu est ce que personne ne peut copier.","Cherche les angles qu'ils n'explorent PAS — c'est là que ton différenciant peut s'exprimer."]},
{id:55,cat:"business",text:"Trouver mon angle différenciant (ce que je dis que les autres ne disent pas)",ideas:["Ton différenciant réel : 32 ans, parcours concret, transformation en cours, pas de bullshit positif — le développement personnel version honnête et masculine.","Formule l'angle en 1 phrase : 'Du mindset sans positivité toxique, pour les hommes qui veulent se reconstruire vraiment.'","Le différenciant n'est pas un style graphique — c'est un point de vue unique sur un sujet."]},
{id:56,cat:"business",text:"Écrire et publier mon premier thread/carrousel long format",ideas:["Structure : Titre fort (slide 1) → Promesse (slide 2) → 5-7 slides développement (1 idée par slide) → Conclusion → CTA.","Outil Canva gratuit pour le design. Choisis 1 palette de couleurs et 2 polices max. Reste sobre.","Le premier carrousel prend 3h. Le dixième prend 45 min. Lance-toi maintenant."]},
{id:57,cat:"business",text:"Créer une newsletter et envoyer le premier numéro",ideas:["Plateforme : Substack (gratuit, simple, communauté intégrée). Ou Kit (ex-ConvertKit) si tu veux plus de contrôle.","Premier numéro : ton histoire et pourquoi tu lances ça. Sois honnête sur le chemin, pas juste sur la destination.","1 email par semaine maximum. La newsletter est un espace intime — ne surexpose pas."]},
{id:58,cat:"business",text:"Atteindre 100 abonnés à ma newsletter",ideas:["Mentionne ta newsletter dans chaque post Instagram et LinkedIn avec un lien direct.","Offre un bonus exclusif pour l'inscription : PDF, guide, liste de ressources. Simple mais utile.","Les 100 premiers abonnés newsletter valent plus que 1000 abonnés Instagram — ce sont des gens qui ont fait un vrai choix."]},
{id:59,cat:"business",text:"Publier un article de fond sur un sujet philosophique ou psychologique",ideas:["800-1500 mots. Choisis un concept que tu as vécu (ex: le stoïcisme face à l'échec, la liberté comme responsabilité).","Structure : accroche (histoire ou question) → développement avec 2-3 angles → conclusion + invitation.","Publie sur LinkedIn Articles, Substack ou Medium. Les articles longs positionnent comme expert plus vite que les posts courts."]},
{id:60,cat:"business",text:"Faire ma première collaboration avec un autre créateur",ideas:["Identifie 3 créateurs avec une audience similaire ou légèrement plus grande. Propose un échange de valeur clair : co-création de contenu, mention croisée, live ensemble.","Approche honnête : commence par commenter leurs posts sincèrement pendant 2-3 semaines avant de proposer une collab.","La collab parfaite n'existe pas — la première collab imparfaite, si."]},
{id:61,cat:"business",text:"Répondre à tous les commentaires de mes posts pendant 2 semaines",ideas:["Programme 15 minutes par jour uniquement pour les réponses aux commentaires. C'est le meilleur investissement pour construire une vraie communauté.","Les algorithmes Instagram et LinkedIn favorisent les posts qui génèrent des échanges. Répondre = distribution organique.","Réponds dans les 2 premières heures après publication — c'est quand l'algorithme évalue l'engagement."]},
{id:62,cat:"business",text:"Lancer un live ou une session Q&A en ligne",ideas:["Annonce 48h à l'avance avec un sujet précis. 'Live : 3 erreurs de mindset qui me bloquaient à 30 ans.'","Prépare 5 questions pour relancer si le silence s'installe au début. Le live démarre toujours lentement.","Instagram Live ou YouTube Live. 30-45 minutes maximum pour commencer."]},
{id:63,cat:"business",text:"Créer un lead magnet (guide gratuit sur un thème mindset)",ideas:["PDF de 7-12 pages sur un problème très précis. Ex: 'Les 5 croyances qui sabotent les hommes ambitieux — et comment les identifier.'","Design simple sur Canva. Contenu > forme. Mais une mise en page propre augmente la perception de valeur.","Héberge sur Gumroad (gratuit) ou directement dans Substack."]},
{id:64,cat:"business",text:"Apprendre les bases du copywriting pour écrire des posts qui accrochent",ideas:["Les 3 bases : Hook irrésistible (curiosité ou douleur nommée) → Corps (preuve ou histoire) → CTA clair.","Ressource : le compte Twitter/X de @alexgarcia_atx ou le livre 'The Adweek Copywriting Handbook'.","Exerce-toi en réécrivant les hooks de tes 5 derniers posts. Combien pourrais-tu améliorer ?"]},
{id:65,cat:"business",text:"Tester un format vidéo court (reel, short) sur un insight mindset",ideas:["Structure : phrase choc en ouverture (0-2 secondes) → développement rapide → conclusion mémorable. Zéro introduction.","Tourne debout, en lumière naturelle, sans fond distrayant. La qualité audio compte plus que l'image.","Publie le même reel sur Instagram Reels, YouTube Shorts et TikTok. Triple distribution, un seul effort."]},
{id:66,cat:"business",text:"Documenter ma transformation en temps réel dans mon contenu",ideas:["'Build in public' appliqué au développement personnel : partage ce que tu apprends, essaies, rates, corriges.","C'est ton meilleur contenu. Les gens ne s'abonnent pas à la version parfaite — ils s'abonnent au chemin réel.","Exemple de format : 'Voilà ce que j'ai découvert cette semaine sur [X] en essayant [Y].'"]},
{id:67,cat:"business",text:"Créer ma première offre payante (atelier, appel, programme)",ideas:["Commence simple : session de 60 minutes de coaching à 80-150€. Pas besoin d'un programme complexe pour commencer.","L'offre qui se vend le mieux au début : résoudre un problème très précis en temps limité. Ex: 'Séance de clarification de ta direction'.","Pas besoin d'un site web. Un lien Calendly + paiement PayPal/Stripe suffit pour commencer."]},
{id:68,cat:"business",text:"Vendre mon premier produit ou service lié au mindset/coaching",ideas:["Propose-le d'abord à 5 personnes de ton réseau proche qui te font confiance. Demande un retour sincère.","Prix psychologique : 97€ ou 197€ sont plus convaincants que 100€ ou 200€. La perception de valeur compte.","Si la vente est difficile, c'est soit le prix, soit le message, soit la cible. Modifie une chose à la fois."]},
{id:69,cat:"business",text:"Générer mes premiers 500€ via mon contenu ou une offre associée",ideas:["4-5 sessions de coaching à 100-120€. Ou un atelier en ligne de 20 personnes à 25€. C'est accessible dans les 3 premiers mois.","Les premiers 500€ valident l'idée. Ils ne paient pas les factures — ils prouvent que le modèle fonctionne.","Note ce qui a mené à cette vente. Répète exactement le processus pour les 500€ suivants."]},
{id:70,cat:"business",text:"Générer mes premiers 1000€",ideas:["Combine : 2-3 sessions de coaching + un PDF ou guide payant à 27-47€. La récurrence commence ici.","À ce palier, demande des témoignages à chaque client. Le social proof est ton actif le plus précieux pour la suite.","Réinvestis une partie dans ton propre développement : formation, coaching, livre. Investis sur le produit (toi)."]},
{id:71,cat:"business",text:"Créer un budget mensuel écrit et le tenir",ideas:["Format simple (Google Sheet) : Revenus fixes → Dépenses fixes → Objectif épargne → Reste disponible.","Fais-le le 1er de chaque mois. 30 minutes max. Sans data, aucune décision financière n'est vraiment éclairée.","Distingue les dépenses qui t'investissent (formation, santé, outils) des dépenses qui te distraient."]},
{id:72,cat:"business",text:"Suivre mes dépenses pendant 1 mois entier",ideas:["App Bankin ou YNAB (You Need A Budget). Connecte ton compte bancaire — la synchronisation automatique enlève l'excuse de l'oubli.","Catégorise chaque dépense en fin de journée (30 secondes). En fin de mois, les patterns sautent aux yeux.","Pas de jugement sur les dépenses passées. L'objectif est la conscience, pas la culpabilité."]},
{id:73,cat:"business",text:"Rembourser une dette prioritaire",ideas:["Méthode avalanche : identifie la dette avec le taux d'intérêt le plus élevé. Rembourse-la en priorité.","Méthode boule de neige (si tu as besoin de motivation) : commence par la plus petite dette pour avoir une victoire rapide.","Contacte l'organisme créancier si tu es en difficulté — un échéancier négocié est toujours possible."]},
{id:74,cat:"business",text:"Mettre de côté 10% de chaque revenu reçu",ideas:["Virement automatique dès réception du revenu sur un compte épargne séparé. L'automatisme empêche la tentation.","10% semble peu mais crée l'habitude mentale. L'habitude d'épargner est plus précieuse que le montant initial.","Nomme le compte 'Liberté' ou 'Futur'. Les noms chargés de sens réduisent les tentatives de piochage."]},
{id:75,cat:"business",text:"Me déclarer officiellement (statut auto-entrepreneur ou autre)",ideas:["Autoentrepreneur.urssaf.fr — déclaration en ligne, gratuite, 10 minutes. Obligatoire pour facturer légalement.","Le statut auto-entrepreneur est parfait pour commencer : zéro charge fixe, cotisations proportionnelles au CA.","Une fois déclaré, ouvre un compte bancaire pro dédié (N26 Business ou Shine gratuits)."]},
{id:76,cat:"business",text:"Tenir 6 mois de publication régulière sans arrêter",ideas:["La consistance sur 6 mois te met dans le top 5% des créateurs. La plupart abandonnent avant 3 mois.","Si tu rates un jour, ne rattrape pas. Reprends le rythme normal le lendemain. La règle du 'jamais deux fois de suite'.","Documente ton évolution de post #1 à post #60. La progression visible est une source de motivation puissante."]},
{id:77,cat:"business",text:"Écrire sur un sujet qui me fait peur de publier",ideas:["C'est souvent ce post-là qui performe le mieux. La peur de publier = sujet qui compte vraiment.","Commence par un brouillon que tu ne publieras peut-être jamais. L'acte d'écrire sans pression libère.","La vulnérabilité calibrée (précise, intentionnelle, sans drama) est la forme la plus magnétique de contenu."]},
{id:78,cat:"business",text:"Recevoir un message d'un abonné disant que mon contenu l'a aidé",ideas:["Ça arrive quand tu es authentique et régulier. Pas de technique secrète.","Sauvegarde ce message. Lis-le les jours où tu doutes. C'est ton carburant.","Ce message prouve que ton travail a de l'impact. Il précède toujours la monétisation."]},
{id:79,cat:"business",text:"Définir ce que le succès dans ce projet signifie pour moi dans 1 an",ideas:["Sois précis : nombre d'abonnés cible, revenus mensuels, qualité de vie, sentiment dominant. Un objectif flou reste un rêve.","Définis aussi le processus qui mène au résultat : combien de posts par semaine, combien d'heures de création, combien de sessions de coaching.","Revois cette définition dans 6 mois. Tu auras appris des choses qui l'affineront."]},
{id:80,cat:"business",text:"Calculer combien d'abonnés / de clients me permettraient de vivre de ça",ideas:["Exemple : 20 clients coaching à 200€/mois = 4000€. Ou 1000 abonnés newsletter × 3% conversion × 97€ produit = 2910€.","Ce calcul rend l'objectif concret et mesurable. Tu sais maintenant exactement vers quoi naviguer.","Reverse-engineer : si j'ai besoin de 20 clients, combien de prospects dois-je contacter par semaine pour y arriver ?"]},

// ── CORPS & SANTÉ ──────────────────────────────────────────────────────────
{id:81,cat:"corps",text:"Faire 3 séances de sport par semaine pendant 1 mois",ideas:["Planifie les jours à l'avance (lundi/mercredi/vendredi ou mardi/jeudi/samedi). Inscris-les comme des RDV.","Commence par 30-40 minutes si tu manques de forme. La durée augmente naturellement avec l'habitude.","La séance la plus difficile est celle pour laquelle tu t'étires le plus d'excuses. C'est celle-là qu'il faut le plus faire."]},
{id:82,cat:"corps",text:"Tenir 4 séances par semaine pendant 1 mois",ideas:["Ajoute une séance légère (marche rapide, mobilité, natation) pour atteindre 4 sans sur-solliciter la récupération.","Prépare ton sac de sport la veille et pose-le à l'entrée. L'inertie se combat avec la réduction de friction.","Suis ta progression dans une app (Strong pour la muscu, Strava pour le cardio). Les données motivent."]},
{id:83,cat:"corps",text:"Faire 100 pompes par jour pendant 30 jours (progressif)",ideas:["Semaine 1 : 4 séries de 25 réparties dans la journée. Semaine 2 : 5 séries de 20. Semaine 3-4 : augmente la densité.","Pas besoin de les faire en une seule fois au départ. L'objectif est l'accumulation quotidienne, pas la performance en une série.","Varie les prises (large, serrée, inclinée) pour solliciter les trois portions pectorales."]},
{id:84,cat:"corps",text:"Courir 3km sans m'arrêter",ideas:["Programme progressif sur 3 semaines : semaine 1 = intervalles marche/course (1min/2min). Semaine 2 = 1km continu + marche. Semaine 3 = 3km.","Rythme de conversation : si tu ne peux pas parler en courant, tu vas trop vite. Ralentis.","App Couch to 5K (C25K) — programme guidé sur téléphone, 3x/semaine, 8 semaines."]},
{id:85,cat:"corps",text:"Courir 5km sans m'arrêter",ideas:["Une fois à l'aise sur 3km, augmente de 500m par semaine. Progression lente = moins de blessures.","Participe à un 5km local (run urbain, Color Run) pour avoir un objectif de race day. La date externe crée l'engagement.","Chaussures adaptées à ta foulée — visite un magasin spécialisé. C'est le seul équipement vraiment important."]},
{id:86,cat:"corps",text:"Faire 1 mois de sport sans aucune excuse",ideas:["Avant-garde contre les excuses : prépare à l'avance des solutions pour les 5 excuses les plus courantes (fatigue, manque de temps, mauvais temps, manque de motivation).","La règle des 10 minutes : si tu n'as pas envie de t'entraîner, mets tes vêtements de sport et fais 10 minutes. Souvent tu continues.","Tiens un calendrier physique et coche chaque jour d'entraînement. La chaîne visuelle est un outil de motivation puissant."]},
{id:87,cat:"corps",text:"Apprendre les bases de la nutrition (macros, calories)",ideas:["Macros = protéines, glucides, lipides. Début : vise 1,6g de protéines par kg de poids corporel par jour.","App MyFitnessPal (gratuite) pour scanner les aliments et comprendre la composition de ce que tu manges. Pas besoin de peser à vie — juste 2-3 semaines pour calibrer l'œil.","Livre recommandé : 'The Renaissance Diet 2.0' (Mike Israetel) ou les vidéos YouTube du Dr Mike."]},
{id:88,cat:"corps",text:"Cuisiner mes repas moi-même 5 jours/semaine pendant 1 mois",ideas:["Meal prep le dimanche : 2h de cuisine = 5 repas prêts. Légumineuses, riz, légumes rôtis, protéine cuite.","3 recettes simples à maîtriser = base solide : poulet grillé/légumes/riz, œufs brouillés/légumes, salade repas protéinée.","La règle 80/20 : 80% de repas faits maison suffit. Pas besoin de perfection — besoin de régularité."]},
{id:89,cat:"corps",text:"Arrêter la malbouffe pendant 2 semaines consécutives",ideas:["Ne la retire pas — remplace. Chips → noix. Sodas → eau gazeuse. Fast food → meal prep.","Vide les placards des aliments problématiques. On ne résiste pas à la tentation — on la retire de l'environnement.","Les 3 premiers jours sont les plus difficiles (sucre principalement). Après 5 jours, l'envie diminue fortement."]},
{id:90,cat:"corps",text:"Réduire ma consommation de sucre pendant 1 mois",ideas:["Commence par éliminer les sucres liquides : sodas, jus de fruits, boissons sucrées. C'est le levier le plus impactant.","Lis les étiquettes des produits ultra-transformés. Le sucre se cache sous des dizaines de noms (sirop de glucose, maltodextrine, sucrose).","Remplacement : fruits entiers pour le sucré naturel (la fibre ralentit l'absorption). Fruits rouges, pommes, bananes."]},
{id:91,cat:"corps",text:"Boire 2L d'eau par jour pendant 30 jours",ideas:["Pose une bouteille de 1L sur ton bureau et une autre dans la cuisine. Objectif visuel = 2 bouteilles vidées.","Bois 1 grand verre dès le réveil avant tout. Puis 1 verre avant chaque repas. La formule est simple.","Si tu oublies, programme 4 rappels téléphoniques aux heures clés (9h, 12h, 15h, 18h)."]},
{id:92,cat:"corps",text:"Dormir 7-8h par nuit pendant 2 semaines consécutives",ideas:["Coucher et lever à heures fixes, même le week-end. La régularité du rythme circadien est la base.","Chambre froide (18-19°C), noire, silencieuse. Ce sont les 3 conditions fondamentales du sommeil profond.","Évite l'alcool et les repas lourds dans les 3h avant le coucher — les deux dégradent la qualité du sommeil profond."]},
{id:93,cat:"corps",text:"Créer une routine de réveil sans alarme (rythme naturel)",ideas:["Faisable en allant au lit à heure fixe et en exposant ton corps à la lumière naturelle dès le matin.","Masque de sommeil pour bloquer la lumière artificielle. Rideaux occultants pour les matins.","Ton corps se lèvera naturellement quand il aura eu ses cycles complets. Ça prend 2-3 semaines pour se calibrer."]},
{id:94,cat:"corps",text:"Ajouter une marche de 30 min par jour pendant 2 semaines",ideas:["Marche sans téléphone ou avec un podcast. Deux modes : méditation en mouvement ou apprentissage passif.","La marche après les repas (15-20 min) régule la glycémie et améliore la digestion. Simple et puissant.","10 000 pas est l'objectif standard mais 30 minutes de marche continue a un impact cardiovasculaire supérieur."]},
{id:95,cat:"corps",text:"Apprendre à faire un squat correct",ideas:["4 points clés : pieds à largeur d'épaules, dos droit (pas voûté), genoux dans l'axe des orteils, descente sous parallèle.","Commence avec le squat au poids de corps face à un miroir. 3 séries de 10 lentes (3 secondes descente).","Vidéo référence : Alan Thrall sur YouTube — 'Untamed Strength Squat'. 10 minutes qui valent des mois d'erreurs."]},
{id:96,cat:"corps",text:"Atteindre un objectif de force (ex : 10 tractions)",ideas:["Programme progressif : semaine 1-2 = tractions assistées avec élastique. Semaine 3-4 = 3 séries de négatifs (descente lente). Mois 2 = 1-2 tractions puis augmentation.","La traction est le meilleur exercice du dos. Avoir 10 tractions propres à 32 ans est un vrai marqueur de condition physique.","Suivi : note le nombre de reps à chaque séance dans une app. La progression visible est motivante."]},
{id:97,cat:"corps",text:"Prendre des photos de progression corporelle mensuelle",ideas:["Même lumière, même heure, même angle à chaque fois (matin à jeun, lumière naturelle, de face et de profil).","La transformation physique est lente et invisible au quotidien. Les photos mensuelles révèlent ce que le miroir quotidien cache.","Garde ces photos privées. Elles sont pour toi, pas pour les réseaux."]},
{id:98,cat:"corps",text:"Réduire ma consommation d'alcool pendant 1 mois",ideas:["Remplace par une alternative physique et savoureuse : eau gazeuse + citron, kombucha, thé glacé.","Identifie les contextes déclencheurs (stress, sortie sociale, ennui). Prépare une alternative pour chaque.","Les bénéfices après 30 jours : meilleur sommeil, peau plus nette, énergie matinale supérieure, perte de poids."]},
{id:99,cat:"corps",text:"Faire un bilan de santé",ideas:["Prise de sang annuelle : glycémie, cholestérol, ferritine, vitamine D, testostérone totale. Indispensable à 32 ans.","Chez ton médecin généraliste sur prescription ou laboratoire directement (Ramsay, Synlab). Résultats en 24h.","La vitamine D et la ferritine sont souvent en déficit et impactent directement l'énergie et l'humeur."]},
{id:100,cat:"corps",text:"Créer un programme d'entraînement adapté à mes objectifs",ideas:["Définis d'abord : objectif prise de masse, perte de gras, ou performance ? Chaque objectif a un protocole différent.","Programme débutant/intermédiaire éprouvé : PPL (Push/Pull/Legs) 3-6 jours, ou Starting Strength (3 jours, fondamentaux).","Si budget le permet : 1-2 séances avec un coach personnel pour apprendre les mouvements fondamentaux correctement."]},
{id:101,cat:"corps",text:"Suivre ce programme pendant 60 jours",ideas:["60 jours = assez long pour voir des changements mesurables et assez court pour rester focalisé.","Prends des notes après chaque séance : exercices, charges, reps. La progression sur les chiffres est la preuve que ça marche.","Si tu rates une séance, ne la rattrape pas. Reprends normalement la séance suivante."]},
{id:102,cat:"corps",text:"Apprendre 3 exercices avec du matériel minimal (chez soi)",ideas:["Les 3 fondamentaux sans matériel : pompe (poitrine/épaules/triceps), squat bulgare (jambes/fessiers), gainage planche (core).","Avec une barre de traction sur porte-cadre (30-50€) : traction, rowing australien, hanging leg raise.","YouTube : Tom Merrick ou Calisthenic Movement pour des programmes complets sans équipement."]},
{id:103,cat:"corps",text:"Faire du sport même quand je n'en ai pas envie, 3 fois",ideas:["La règle des 2 minutes : mets tes vêtements de sport. Rien de plus. 90% du temps tu continues ensuite.","La motivation suit l'action, elle ne la précède pas. Le corps se réchauffe en 10 minutes et l'envie vient.","Note comment tu te sens APRÈS ces 3 séances 'forcées'. Cette comparaison est la meilleure preuve."]},
{id:104,cat:"corps",text:"Mesurer et noter ma progression physique chaque mois",ideas:["Mesures mensuelles : poids (le matin à jeun), tour de taille, tour de poitrine, performances sportives.","Les photos + les mensurations + les performances donnent un tableau complet que le poids seul ne peut donner.","Célèbre les progressions mesurables. Même 0,5cm de moins au tour de taille après 1 mois est une victoire."]},
{id:105,cat:"corps",text:"Me peser le même jour chaque semaine pendant 8 semaines",ideas:["Le mardi matin à jeun (après les toilettes, avant de manger) — évite les fluctuations du week-end.","Le poids varie de 1-2kg selon la rétention d'eau, les repas, le cycle hormonal. Ne juge pas sur une seule mesure.","Regarde la tendance sur 4 semaines, pas la variation d'une semaine à l'autre."]},
{id:106,cat:"corps",text:"Améliorer ma posture (exercices quotidiens)",ideas:["3 exercices quotidiens (5 min) : Face pull avec élastique / Superman / Bird-dog. Ciblen le bas du dos et les rhomboïdes.","La posture du bureau : écran à hauteur des yeux, épaules en arrière et basses, lombaires soutenues.","Rappel : une alarme toutes les 2h pour te lever 2 minutes du bureau. La sédentarité prolongée est l'ennemi de la posture."]},
{id:107,cat:"corps",text:"Faire du stretching 10 min après chaque séance pendant 1 mois",ideas:["Focus sur les groupes musculaires sollicités. Après jambes : quadriceps, ischio-jambiers, mollets. Après haut du corps : pectoraux, biceps, épaules.","Maintiens chaque étirement 20-30 secondes minimum. En dessous, l'effet est quasi nul.","Stretching statique après la séance, jamais avant (ça réduit la performance). Avant = dynamique."]},
{id:108,cat:"corps",text:"Apprendre les bases de la récupération musculaire",ideas:["La croissance musculaire se fait pendant la récupération, pas pendant l'entraînement. Dormir 7-8h n'est pas optionnel.","Fenêtre de 30 min post-entraînement : 25-40g de protéines (shake ou repas complet). Optimise la synthèse protéique.","Méthodes de récupération active : marche légère, mobilité, bain froid (si tu veux aller plus loin)."]},
{id:109,cat:"corps",text:"Faire une semaine de détox digitale + sport intense",ideas:["Règle : pas de réseaux sociaux pendant 7 jours. Sport tous les jours (même 30 min de marche).","Observe l'impact sur ton énergie, ta concentration et ton humeur. La différence est souvent frappante.","Utilise le temps récupéré pour les lectures, l'écriture ou simplement la présence avec les proches."]},
{id:110,cat:"corps",text:"Tenir un journal alimentaire pendant 2 semaines",ideas:["Note tout ce que tu manges dans MyFitnessPal. Pas pour calculer des calories à l'euro-près — pour avoir conscience de tes réels apports.","Après 2 semaines, 2-3 patterns problématiques apparaissent. C'est suffisant pour savoir quoi corriger.","Pas besoin de continuer éternellement. 2 semaines de conscience calibrent l'intuition pour les mois suivants."]},
{id:111,cat:"corps",text:"Préparer mes repas de la semaine le dimanche (meal prep)",ideas:["2h le dimanche = 5 dîners et 5 déjeuners sains prêts. Calcul de temps : 30 secondes de réchauffage vs 30 min de livraison.","Base solide : riz ou patate douce (glucides) + légumes rôtis + protéine (poulet, œufs, légumineuses). Décline à l'infini avec les sauces.","Achète des boîtes en verre hermétiques. Plus sain que le plastique, et l'aspect visuel donne envie de les manger."]},
{id:112,cat:"corps",text:"Pratiquer une activité physique que je n'ai jamais testée",ideas:["Options : boxe, natation, escalade, yoga, CrossFit, sport collectif (basket, football à 5). Choisis ce qui t'intrigue.","L'activité physique que tu n'as jamais testée est souvent celle que tu aimes le plus. La nouveauté active la dopamine.","1 cours d'essai suffit pour décider. La plupart des salles offrent une séance découverte gratuite."]},
{id:113,cat:"corps",text:"Atteindre un IMC dans la fourchette santé",ideas:["IMC entre 18,5 et 24,9 = fourchette santé. Calcul : poids (kg) / taille² (m). Indicateur imparfait mais utile comme référence.","L'IMC ne tient pas compte de la masse musculaire. Préfère la mesure du tour de taille (< 94cm pour un homme) comme indicateur de santé métabolique.","Objectif SMART : X kg de moins en Y mois, à raison de 0,5-1kg par semaine (déficit calorique de 500kcal/jour)."]},
{id:114,cat:"corps",text:"Faire 10 000 pas par jour pendant 2 semaines",ideas:["Active le podomètre natif (iPhone Santé ou Google Fit). Pas besoin d'une montre connectée.","Stratégies simples : descendre 1 arrêt de transport avant, marcher pendant les appels téléphoniques, prendre les escaliers systématiquement.","10 000 pas ≈ 7-8 km ≈ 60-70 minutes de marche. Répartis sur la journée, c'est très atteignable."]},
{id:115,cat:"corps",text:"Réduire le café à 1 par jour pendant 2 semaines",ideas:["La caféine a une demi-vie de 5-6h. Un café à 15h impacte encore le sommeil à 21h. Un seul le matin, avant 12h.","Remplacement l'après-midi : thé vert (caféine légère + L-théanine qui évite l'effet crash), eau gazeuse, tisane.","La tolérance à la caféine se réinitialise en 2 semaines. Après, un seul café a l'effet de 3 auparavant."]},
{id:116,cat:"corps",text:"Aller dormir avant 23h pendant 2 semaines consécutives",ideas:["Le sommeil avant minuit est plus réparateur — les cycles de sommeil profond sont plus longs entre 22h et 2h.","Rituel de descente : à 22h, lumières tamisées, téléphone en mode avion, lecture physique ou étirements.","Résistance initiale : les premières nuits tu ne t'endormiras peut-être pas immédiatement. L'important est d'être au lit, pas d'être endormi."]},
{id:117,cat:"corps",text:"Éviter les écrans 1h avant le coucher pendant 14 jours",ideas:["La lumière bleue des écrans supprime la mélatonine et retarde l'endormissement de 90 minutes en moyenne.","Alternatives : lecture physique, journaling, étirements, conversation, préparation du lendemain.","Mode nuit sur les appareils (lumière chaude) aide mais ne résout pas le problème cognitif de la stimulation des écrans."]},
{id:118,cat:"corps",text:"Commencer une activité de mobilité (yoga, stretching)",ideas:["Yoga With Adriene sur YouTube — cours gratuits de 20-60 min adaptés à tous les niveaux. La meilleure introduction.","Mobilité ≠ stretching passif. Inclus des rotations articulaires, des positions de yoga, et des mouvements fonctionnels.","10 minutes le matin de mobilité changent la journée entière. Commence petit et builds."]},
{id:119,cat:"corps",text:"Intégrer des abdos dans ma routine quotidienne",ideas:["Les grands abdominaux : planche (30s-60s), crunch à vélo, leg raises. 3 exercices, 3 séries chacun, tous les jours.","Le 'core' ce sont aussi les muscles profonds. Le gainage en planche les sollicite plus efficacement que les crunchs classiques.","Les abdos se font 80% à table. Sans déficit calorique ou alimentation propre, l'entraînement abdominal ne suffit pas."]},
{id:120,cat:"corps",text:"Battre un record personnel dans un exercice",ideas:["Choisis l'exercice que tu pratiques le plus : pompes max, km couru, poids soulevé, temps en planche.","Un PR (Personal Record) est la preuve concrète de progression. Il court-circuite le doute.","Filmage recommandé : voir ta propre performance de l'extérieur révèle des choses qu'on ne ressent pas."]},

// ── FAMILLE & HÉRITAGE ────────────────────────────────────────────────────
{id:121,cat:"famille",text:"Appeler ma famille une fois par semaine régulièrement",ideas:["Planifie un créneau fixe : dimanche 11h par exemple. La régularité renforce le lien plus que la durée.","Si tu ne sais pas quoi dire : pose une vraie question sur leur semaine et écoute vraiment. Pas de monologue.","Un appel de 10 minutes vrai vaut mieux qu'un appel d'1h distrait."]},
{id:122,cat:"famille",text:"Organiser un repas en famille dans le mois",ideas:["Prends l'initiative — ne pas attendre que ça arrive spontanément. Propose une date, un lieu, un plat que tu cuisines.","Un repas organisé par toi = un signal fort que tu te repositionnes comme quelqu'un qui prend soin des autres.","Éteins ton téléphone pendant ce repas. Complètement."]},
{id:123,cat:"famille",text:"Exprimer de la gratitude à un proche par écrit",ideas:["Un message ou lettre sincère, adressé à une personne spécifique, pour une chose spécifique qu'il ou elle a fait.","La gratitude exprimée renforce les deux côtés : la relation et ta propre conscience de ce qui compte.","Format simple : 'Quelque chose dont je ne t'ai jamais remercié...' La spécificité rend le message dix fois plus fort."]},
{id:124,cat:"famille",text:"Régler une tension non exprimée avec un membre de ma famille",ideas:["Commence par écrire ce que tu ressens (pour toi seul) avant d'en parler. Ça clarifie et désamorce l'émotion brute.","Approche : parle de ton ressenti (je), pas de l'accusation (tu). 'Je me suis senti exclu' > 'Tu ne m'as jamais inclus.'","Si la conversation directe est difficile, une lettre peut être le premier pas."]},
{id:125,cat:"famille",text:"Contribuer financièrement au foyer même symboliquement",ideas:["Même un geste concret et régulier (courses, facture, dîner) dit plus que des mots sur le repositionnement.","L'autonomie financière commence par les petits gestes. La direction compte autant que le montant.","Propose-le sans attendre qu'on te le demande. L'initiative est le signal."]},
{id:126,cat:"famille",text:"Être présent à 100% lors d'un repas de famille (pas de téléphone)",ideas:["Téléphone en mode avion, posé hors de portée, pendant toute la durée du repas.","Pratique l'écoute active : reformule ce que les autres disent avant de répondre. Ça change la qualité d'une conversation.","Ta présence complète est le cadeau le plus précieux que tu puisses offrir à un proche."]},
{id:127,cat:"famille",text:"Écrire ce que je veux transmettre à ma famille dans 10 ans",ideas:["Pense à 3 domaines : valeurs (ce que je veux leur montrer), comportements (comment je veux être vu), héritage matériel ou symbolique.","Cette réflexion clarifie ce que tu dois commencer à construire maintenant, pas dans 10 ans.","Partage cette liste avec quelqu'un de confiance. L'engagement public ancre les intentions."]},
{id:128,cat:"famille",text:"Identifier comment mon succès impacte positivement ceux que j'aime",ideas:["Réfléchis en concret : si je gagne en liberté financière, ma famille n'a plus à s'inquiéter pour moi. Si je suis épanoui, je suis une présence positive, pas une source de stress.","Transforme le succès personnel en motivation collective : 'Je réussis pour moi ET pour eux.'","Note 3 façons précises dont ta réussite les aide directement."]},
{id:129,cat:"famille",text:"Faire une action concrète pour alléger la charge d'un proche",ideas:["Demande d'abord ce dont ils ont besoin plutôt que de supposer. Souvent c'est du temps ou de la présence, pas de l'argent.","Exemples : courses, garde d'enfant, aide administrative, simple écoute sans conseil.","Une action non demandée, observée et réalisée spontanément, a plus de valeur qu'une aide sollicitée."]},
{id:130,cat:"famille",text:"Partager mes objectifs avec un membre de famille de confiance",ideas:["Choisis quelqu'un qui te soutient sans te juger. Pas quelqu'un qui minimisera ou sur-protègera.","Partager tes objectifs crée un engagement social léger mais réel. Tu seras moins tenté d'abandonner.","Demande-lui de te poser 1 question par mois sur tes avancées. Simple et efficace."]},
{id:131,cat:"famille",text:"Créer une tradition simple avec un proche",ideas:["Un café hebdomadaire, une marche mensuelle, un appel de 30 minutes le dimanche. Simple, régulier, ancré.","Les traditions créent de la sécurité et du lien. Elles existent dans la répétition, pas dans l'exceptionnel.","Lance-la sans annoncer que c'est une tradition. Après 3-4 fois, ça deviendra naturellement un rituel."]},
{id:132,cat:"famille",text:"Aider un membre de la famille à résoudre un problème concret",ideas:["Demande d'abord : 'Est-ce que tu veux de l'aide ou juste être écouté ?' La différence est fondamentale.","Utilise tes compétences actuelles : rédiger un courrier, faire une démarche administrative, chercher une information.","Résoudre un problème concret pour quelqu'un est une expression de puissance plus forte que les grandes déclarations."]},
{id:133,cat:"famille",text:"Définir ce que être le roc signifie pour moi concrètement",ideas:["Le roc n'est pas celui qui ne ressent rien — c'est celui qui stabilise les autres parce qu'il est stable lui-même.","Décris 3 situations précises où tu veux être 'le roc'. Qu'est-ce que tu fais, dis, ne fais pas ?","La stabilité intérieure précède la stabilité visible. Travaille d'abord sur toi."]},
{id:134,cat:"famille",text:"Écrire une lettre à un parent pour lui expliquer ma trajectoire",ideas:["Pas de justification ni de défense — juste une explication honnête de ce que tu vis, veux et construis.","Cette lettre est autant pour toi que pour eux. L'écrire clarifie ce que tu penses.","Tu peux décider de l'envoyer ou non. L'acte d'écriture a déjà une valeur indépendante."]},
{id:135,cat:"famille",text:"Identifier la culpabilité passée et en écrire une résolution",ideas:["Liste les situations passées qui génèrent encore de la culpabilité. Pour chacune : qu'est-ce que tu ferais différemment ? Qu'est-ce qui était hors de ton contrôle ?","La culpabilité non résolue est une ancre. La résolution écrite (même imparfaite) libère de l'énergie cognitive.","Si une situation demande une réparation (excuse, action), fais-la. Sinon, autorise-toi à avancer."]},
{id:136,cat:"famille",text:"Prendre soin de ma santé mentale pour ne pas contaminer mes proches",ideas:["Reconnaître l'impact de ton état émotionnel sur ceux qui t'entourent est déjà un acte de maturité.","Règle de l'oxygène dans l'avion : tu dois d'abord mettre ton masque avant d'aider les autres.","Tes progrès dans le bootcamp et le travail sur toi-même sont directement un investissement dans tes relations."]},
{id:137,cat:"famille",text:"Offrir un cadeau significatif à un proche",ideas:["Le meilleur cadeau est celui qui montre que tu l'as vraiment écouté et observé. Pas le plus cher.","Cadeau de temps : propose une sortie, un atelier, une expérience partagée. Souvent plus précieux qu'un objet.","Un livre qui a changé quelque chose pour toi, avec une note manuscrite expliquant pourquoi — simple et mémorable."]},
{id:138,cat:"famille",text:"Poser une question profonde à un parent sur son histoire de vie",ideas:["Questions : 'Quel a été le moment le plus difficile de ta vie ?' — 'Qu'est-ce que tu aurais voulu faire différemment ?' — 'De quoi es-tu le plus fier ?'","Enregistre la conversation (avec permission). Ces histoires disparaissent avec les générations.","Écoute sans conseiller ni commenter. Juste recevoir."]},
{id:139,cat:"famille",text:"Documenter l'histoire de ma famille même brièvement",ideas:["Interview un parent ou grand-parent. 5 questions, enregistrement vocal ou vidéo.","Écris un document de 1-2 pages sur les origines de ta famille. D'où vient-elle ? Qu'a-t-elle traversé ?","Cette démarche renforce le sentiment d'appartenance et donne une profondeur à ton propre parcours."]},
